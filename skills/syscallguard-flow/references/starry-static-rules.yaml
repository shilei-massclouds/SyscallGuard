schema_version: 1
kind: syscallguard_starry_static_rules
description: "Parameterized Starry static pattern rules used by run_starry_static_check.py."
rules:
  - id: SG001_ENTRY_DISPATCH
    batch_id: "001-syscall-batch-ioctl-renameat2"
    title: "Batch 001 syscall dispatch entries exist"
    rule_refs: ["SYSCALL_ENTRY_ALIAS"]
    applies_to_syscalls:
      - "ioctl"
      - "chdir"
      - "fchdir"
      - "chroot"
      - "mkdir"
      - "mkdirat"
      - "mknod"
      - "mknodat"
      - "getdents64"
      - "link"
      - "linkat"
      - "rmdir"
      - "unlink"
      - "unlinkat"
      - "getcwd"
      - "symlink"
      - "symlinkat"
      - "rename"
      - "renameat"
      - "renameat2"
    path: "os/StarryOS/kernel/src/syscall/mod.rs"
    pass_status: "static_audit_supports"
    fail_status: "missing_pattern"
    patterns:
      - {label: "ioctl dispatch", regex: 'Sysno::ioctl\s*=>\s*sys_ioctl\('}
      - {label: "chdir dispatch", regex: 'Sysno::chdir\s*=>\s*sys_chdir\('}
      - {label: "fchdir dispatch", regex: 'Sysno::fchdir\s*=>\s*sys_fchdir\('}
      - {label: "chroot dispatch", regex: 'Sysno::chroot\s*=>\s*sys_chroot\('}
      - {label: "mkdir dispatch", regex: 'Sysno::mkdir\s*=>\s*sys_mkdir\('}
      - {label: "mkdirat dispatch", regex: 'Sysno::mkdirat\s*=>\s*sys_mkdirat\('}
      - {label: "mknod dispatch", regex: 'Sysno::mknod\s*=>\s*sys_mknod\('}
      - {label: "mknodat dispatch", regex: 'Sysno::mknodat\s*=>\s*sys_mknodat\('}
      - {label: "getdents64 dispatch", regex: 'Sysno::getdents64\s*=>\s*sys_getdents64\('}
      - {label: "link dispatch", regex: 'Sysno::link\s*=>\s*sys_link\('}
      - {label: "linkat dispatch", regex: 'Sysno::linkat\s*=>\s*sys_linkat\('}
      - {label: "rmdir dispatch", regex: 'Sysno::rmdir\s*=>\s*sys_rmdir\('}
      - {label: "unlink dispatch", regex: 'Sysno::unlink\s*=>\s*sys_unlink\('}
      - {label: "unlinkat dispatch", regex: 'Sysno::unlinkat\s*=>\s*sys_unlinkat\('}
      - {label: "getcwd dispatch", regex: 'Sysno::getcwd\s*=>\s*sys_getcwd\('}
      - {label: "symlink dispatch", regex: 'Sysno::symlink\s*=>\s*sys_symlink\('}
      - {label: "symlinkat dispatch", regex: 'Sysno::symlinkat\s*=>\s*sys_symlinkat\('}
      - {label: "rename dispatch", regex: 'Sysno::rename\s*=>\s*sys_rename\('}
      - {label: "renameat dispatch", regex: 'Sysno::renameat\s*=>\s*sys_renameat\('}
      - {label: "renameat2 dispatch", regex: 'Sysno::renameat2\s*=>\s*sys_renameat2\('}

  - id: SG001_LEGACY_WRAPPERS
    batch_id: "001-syscall-batch-ioctl-renameat2"
    title: "Legacy path syscalls delegate to at-family handlers"
    rule_refs: ["SYSCALL_ENTRY_ALIAS"]
    applies_to_syscalls: ["mkdir", "mknod", "link", "rmdir", "unlink", "symlink", "rename", "renameat"]
    path: "os/StarryOS/kernel/src/syscall/fs/ctl.rs"
    pass_status: "static_audit_supports"
    fail_status: "missing_pattern"
    patterns:
      - {label: "mkdir delegates to mkdirat", regex: 'pub fn sys_mkdir[\s\S]*?sys_mkdirat\(AT_FDCWD,\s*path,\s*mode\)'}
      - {label: "mknod delegates to mknodat", regex: 'pub fn sys_mknod[\s\S]*?sys_mknodat\(AT_FDCWD,\s*path,\s*mode,\s*dev\)'}
      - {label: "link delegates to linkat", regex: 'pub fn sys_link[\s\S]*?sys_linkat\(AT_FDCWD,\s*old_path,\s*AT_FDCWD,\s*new_path,\s*0\)'}
      - {label: "rmdir delegates to unlinkat", regex: 'pub fn sys_rmdir[\s\S]*?sys_unlinkat\(AT_FDCWD,\s*path,\s*AT_REMOVEDIR as _\)'}
      - {label: "unlink delegates to unlinkat", regex: 'pub fn sys_unlink[\s\S]*?sys_unlinkat\(AT_FDCWD,\s*path,\s*0\)'}
      - {label: "symlink delegates to symlinkat", regex: 'pub fn sys_symlink[\s\S]*?sys_symlinkat\(target,\s*AT_FDCWD,\s*linkpath\)'}
      - {label: "rename delegates to renameat", regex: 'pub fn sys_rename[\s\S]*?sys_renameat\(AT_FDCWD,\s*old_path,\s*AT_FDCWD,\s*new_path\)'}
      - {label: "renameat delegates to renameat2", regex: 'pub fn sys_renameat[\s\S]*?sys_renameat2\(old_dirfd,\s*old_path,\s*new_dirfd,\s*new_path,\s*0\)'}

  - id: SG001_BAD_FD_EBADF
    batch_id: "001-syscall-batch-ioctl-renameat2"
    title: "fd table lookup reports BadFileDescriptor"
    rule_refs: ["BAD_FD_EBADF"]
    applies_to_syscalls: ["ioctl", "fchdir", "getdents64"]
    path: "os/StarryOS/kernel/src/file/mod.rs"
    pass_status: "static_audit_supports_for_bad_fd"
    fail_status: "missing_pattern"
    patterns:
      - {label: "get_file_like maps missing fd to BadFileDescriptor", regex: 'pub fn get_file_like\(fd: c_int\)[\s\S]*?FD_TABLE[\s\S]*?ok_or\(AxError::BadFileDescriptor\)'}

  - id: SG001_FD_TYPE_ERRNO
    batch_id: "001-syscall-batch-ioctl-renameat2"
    title: "File and directory fd downcasts preserve type errors"
    rule_refs: ["FD_TYPE_ERRNO"]
    applies_to_syscalls: ["fchdir", "getdents64", "linkat", "chroot"]
    path: "os/StarryOS/kernel/src/file/fs.rs"
    pass_status: "partial_static_audit_supports"
    fail_status: "missing_pattern"
    patterns:
      - {label: "File::from_fd distinguishes directory and other types", regex: 'fn from_fd\(fd: c_int\) -> AxResult<Arc<Self>>[\s\S]*?AxError::IsADirectory[\s\S]*?AxError::InvalidInput'}
      - {label: "Directory::from_fd maps non-directory to NotADirectory", regex: 'impl FileLike for Directory[\s\S]*?fn from_fd\(fd: c_int\)[\s\S]*?AxError::NotADirectory'}

  - id: SG001_FLAG_MASKS
    batch_id: "001-syscall-batch-ioctl-renameat2"
    title: "Known at-family flag masks reject unknown bits"
    rule_refs: ["FLAG_MASK_REJECTS_UNKNOWN"]
    applies_to_syscalls: ["linkat", "unlinkat", "renameat2"]
    path: "os/StarryOS/kernel/src/syscall/fs/ctl.rs"
    pass_status: "static_audit_supports"
    fail_status: "missing_pattern"
    patterns:
      - {label: "linkat valid flags mask", regex: 'const LINKAT_VALID_FLAGS[\s\S]*?flags & !LINKAT_VALID_FLAGS[\s\S]*?AxError::InvalidInput'}
      - {label: "unlinkat rejects unknown flags", regex: 'flags & !\(AT_REMOVEDIR as usize\) != 0[\s\S]*?AxError::InvalidInput'}
      - {label: "renameat2 supported flags mask", regex: 'const RENAMEAT2_SUPPORTED_FLAGS[\s\S]*?flags & !RENAMEAT2_SUPPORTED_FLAGS[\s\S]*?AxError::InvalidInput'}

  - id: SG001_PATHMAX_HELPER
    batch_id: "001-syscall-batch-ioctl-renameat2"
    title: "Path loader enforces PATH_MAX with NameTooLong"
    rule_refs: ["PATH_LONG_ENAMETOOLONG"]
    applies_to_syscalls: ["chdir", "chroot", "mkdir", "mkdirat", "mknod", "mknodat", "link", "linkat", "rmdir", "unlink", "unlinkat", "symlink", "symlinkat", "rename", "renameat", "renameat2"]
    path: "os/StarryOS/kernel/src/mm/access.rs"
    pass_status: "partial_static_audit_supports"
    fail_status: "missing_pattern"
    patterns:
      - {label: "PATH_MAX constant", regex: 'pub const PATH_MAX: usize = 4096;'}
      - {label: "vm_load_path_string rejects long paths", regex: 'pub fn vm_load_path_string[\s\S]*?path\.len\(\) >= PATH_MAX[\s\S]*?AxError::NameTooLong'}

  - id: SG001_PATH_HANDLER_LOADS
    batch_id: "001-syscall-batch-ioctl-renameat2"
    title: "Path handlers use vm_load_path_string for path inputs"
    rule_refs: ["PATH_LONG_ENAMETOOLONG", "PATH_RESOLUTION_ERRNO", "DIRFD_AND_AT_FLAGS"]
    applies_to_syscalls: ["chdir", "chroot", "mkdirat", "mknodat", "linkat", "unlinkat", "symlinkat", "renameat2"]
    path: "os/StarryOS/kernel/src/syscall/fs/ctl.rs"
    pass_status: "partial_static_audit_supports"
    fail_status: "missing_pattern"
    patterns:
      - {label: "chdir path loader", regex: 'pub fn sys_chdir[\s\S]*?vm_load_path_string\(path\)\?'}
      - {label: "chroot path loader", regex: 'pub fn sys_chroot[\s\S]*?vm_load_path_string\(path\)\?'}
      - {label: "mkdirat path loader", regex: 'pub fn sys_mkdirat[\s\S]*?vm_load_path_string\(path\)\?'}
      - {label: "mknodat path loader", regex: 'pub fn sys_mknodat[\s\S]*?vm_load_path_string\(path\)\?'}
      - {label: "linkat old/new path loaders", regex: 'pub fn sys_linkat[\s\S]*?map\(vm_load_path_string\)[\s\S]*?vm_load_path_string\(new_path\)\?'}
      - {label: "unlinkat path loader", regex: 'pub fn sys_unlinkat[\s\S]*?vm_load_path_string\(path\)\?'}
      - {label: "symlinkat linkpath loader", regex: 'pub fn sys_symlinkat[\s\S]*?vm_load_path_string\(linkpath\)\?'}
      - {label: "renameat2 old/new path loaders", regex: 'pub fn sys_renameat2[\s\S]*?vm_load_path_string\(old_path\)\?[\s\S]*?vm_load_path_string\(new_path\)\?'}

  - id: SG001_USERPTR_EFAULT
    batch_id: "001-syscall-batch-ioctl-renameat2"
    title: "User pointer paths use VM read/write helpers"
    rule_refs: ["USERPTR_EFAULT"]
    applies_to_syscalls: ["ioctl", "getdents64", "getcwd"]
    path: "os/StarryOS/kernel/src/syscall/fs/ctl.rs"
    pass_status: "partial_static_audit_supports"
    fail_status: "missing_pattern"
    patterns:
      - {label: "ioctl reads user integer pointer", regex: 'pub fn sys_ioctl[\s\S]*?\.vm_read\(\)\?'}
      - {label: "getdents64 writes user buffer", regex: 'pub fn sys_getdents64[\s\S]*?vm_write_slice\(buf,\s*&buffer\.buf\)\?'}
      - {label: "getcwd writes user buffer", regex: 'pub fn sys_getcwd[\s\S]*?vm_write_slice\(buf,\s*cwd\)\?'}

  - id: SG001_MODE_NODE_GUARD
    batch_id: "001-syscall-batch-ioctl-renameat2"
    title: "mkdirat and mknodat apply mode, uid/gid, and node type guards"
    rule_refs: ["MODE_UID_GID_GUARD"]
    applies_to_syscalls: ["mkdir", "mkdirat", "mknod", "mknodat"]
    path: "os/StarryOS/kernel/src/syscall/fs/ctl.rs"
    pass_status: "partial_static_audit_supports"
    fail_status: "missing_pattern"
    patterns:
      - {label: "mkdirat applies umask and fs ids", regex: 'pub fn sys_mkdirat[\s\S]*?umask\(\)[\s\S]*?NodePermission::from_bits_truncate[\s\S]*?fsuid[\s\S]*?fsgid'}
      - {label: "mknodat rejects directory and unknown node types", regex: 'pub fn sys_mknodat[\s\S]*?let ftype = mode & S_IFMT[\s\S]*?S_IFDIR => return Err\(AxError::OperationNotPermitted\)[\s\S]*?_ => return Err\(AxError::InvalidInput\)'}
