version: 1
artifact_formats:
  narrative: markdown
  structured: yaml
human_review_required: true
workflow_steps:
  - "01-scope-selection"
  - "02-spec-ingestion"
  - "03-normalization-review"
  - "04-checkability-classification"
  - "05-starry-evidence-mapping"
  - "06-static-check-or-audit"
  - "07-gap-triage"
  - "08-fix-plan-and-apply-outside-harness"
  - "09-validation"
  - "10-batch-closeout"
review_status_values:
  - pending_human_review
  - confirmed
  - changes_requested
  - not_applicable
batch_closeout_requires:
  all_steps_have_reports: true
  all_steps_have_review_records: true
  all_coverage_items_trace_to_source: true
  all_coverage_items_trace_to_evidence_or_gap: true
  all_gaps_triaged: true
  all_reviews_resolved_by_human: true

