version: 1
behavior_spec:
  required_fields:
    - behavior_id
    - title
    - syscall_area
    - source_refs
    - preconditions
    - action
    - expected_result
    - errno
    - checkability
  checkability_values:
    - static
    - partial_static
    - dynamic
    - unsupported
    - needs_review
normalization_rules:
  - 保留来源中的 errno 和 ABI 细节。
  - 将多行为测试拆分为可独立审核的行为记录。
  - 行为有架构限定时，记录 x86_64 等架构条件。
  - 优先引用快照路径，而不是实时外部路径。
  - 来源不可用时，记录明确的 snapshot gap。
source_ref_required_fields:
  - source_id
  - snapshot_path
  - external_path
  - repository_commit
  - captured_at_utc
