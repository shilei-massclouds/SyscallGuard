version: 1
dynamic_validation_required_fields:
  - behavior_id
  - test_source
  - command
  - target_arch
  - external_repository
  - commit
  - result
  - captured_log
result_values:
  - pass
  - fail
  - skipped
  - not_run
  - manual_audit_only
rules:
  - 除非后续定义工具化步骤，否则动态测试在 SyscallGuard 之外运行。
  - "`not_run` 验证必须包含原因和下一步。"
  - 可用时，应将日志或摘要复制到批次输出中。
  - 只有具备具体来源和证据路径时，才允许人工验证。
