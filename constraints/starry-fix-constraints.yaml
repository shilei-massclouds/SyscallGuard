version: 1
boundary:
  harness_modifies_starry: false
  harness_modifies_ltp: false
external_fix_record_required_fields:
  - behavior_id
  - external_repository
  - branch
  - commit_or_pr
  - affected_paths
  - validation_reference
  - reviewer_notes
allowed_fix_status_values:
  - already_fixed
  - planned_external
  - in_progress_external
  - not_required
  - unsupported
rules:
  - 在 SyscallGuard 中记录 Starry 修复计划，但实际修复在 tgoskits 中完成。
  - 证据优先引用不可变的外部 commit；必要时可以引用最小复制快照。
  - 只有记录验证结果后，SyscallGuard 才接受该修复。
