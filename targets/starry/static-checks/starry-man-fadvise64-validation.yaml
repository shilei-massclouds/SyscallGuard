- MAN_E9F079A1D7478DB3
applies_to_syscalls:
- fadvise64
path: os/StarryOS/kernel/src/syscall/fs/io.rs
patterns:
- label: pipes and other unsupported fd kinds return ESPIPE
  regex: pub fn sys_fadvise64[\s\S]*?downcast_ref::<File>[\s\S]*?downcast_ref::<Directory>[\s\S]*?downcast_ref::<Memfd>[\s\S]*?LinuxError::ESPIPE
- label: advice values above the supported enum return EINVAL
  regex: pub fn sys_fadvise64[\s\S]*?if advice > 5[\s\S]*?AxError::InvalidInput
- label: valid advice returns zero
  regex: pub fn sys_fadvise64[\s\S]*?Ok\(0\)
