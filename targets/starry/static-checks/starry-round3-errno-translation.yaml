- label: missing processes map to ESRCH
  regex: NoSuchProcess => ESRCH
- label: permission failure maps to EPERM
  regex: OperationNotPermitted => EPERM
- label: short output buffers map to ERANGE
  regex: OutOfRange => ERANGE
