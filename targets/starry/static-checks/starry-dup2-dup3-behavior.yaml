schema_version: 1
kind: syscallguard_starry_static_check
check_id: STARRY_DUP2_DUP3_BEHAVIOR
title: dup2 and dup3 validate descriptors, flags, equality, and replacement
rule_refs:
- LTP_098AFE0E8E10B0EF
- LTP_1726C16756E9651C
- LTP_37C625BD7D7C5F1D
- LTP_3A7B17AF231D4158
