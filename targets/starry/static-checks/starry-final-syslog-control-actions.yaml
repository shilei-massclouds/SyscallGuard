kind: syscallguard_starry_static_check
check_id: STARRY_FINAL_SYSLOG_CONTROL_ACTIONS
title: syslog control actions update console state without user-buffer access
rule_refs:
- LTP_4828EB12592F311C
- LTP_6D819B66D5B60871
- LTP_7F4262FC753FC8D9
