    != 0[\s\S]*?AxError::InvalidInput
- label: the inotify object is installed and its fd returned
  regex: pub fn sys_inotify_init1[\s\S]*?add_file_like\(inotify as _, flags & IN_CLOEXEC != 0\)\.map\(\|fd\|
    fd as _\)
