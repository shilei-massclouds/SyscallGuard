applies_to_syscalls:
- close
path: os/StarryOS/kernel/src/file/mod.rs
patterns:
- label: close removes the descriptor from the current fd table
  regex: 'pub fn close_file_like\(fd: c_int\)[\s\S]*?FD_TABLE\.write\(\)\.remove\(fd as usize\)'
