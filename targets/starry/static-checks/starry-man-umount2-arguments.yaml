schema_version: 1
kind: syscallguard_starry_static_check
check_id: STARRY_MAN_UMOUNT2_ARGUMENTS
title: umount2 validates flags, expiry combinations, and fixed results
rule_refs:
- MAN_31D07EC9847501EF
- MAN_3F7E04D796AED484
- MAN_B579CA52E8AA4E73
- MAN_B776E385902BFBDD
applies_to_syscalls:
- umount2
path: os/StarryOS/kernel/src/syscall/fs/mount.rs
patterns:
- label: unknown flag bits return EINVAL
  regex: pub fn sys_umount2[\s\S]*?flags & !VALID_UMOUNT_FLAGS[\s\S]*?AxError::InvalidInput
- label: MNT_EXPIRE conflicts return EINVAL
  regex: flags & MNT_EXPIRE[\s\S]*?flags & \(MNT_FORCE \| MNT_DETACH\)[\s\S]*?AxError::InvalidInput
- label: first successful expiry marking returns EAGAIN
  regex: flags & MNT_EXPIRE[\s\S]*?!target\.mountpoint\(\)\.mark_expired\(\)[\s\S]*?LinuxError::EAGAIN
- label: detach and regular unmount success return zero
  regex: flags & MNT_DETACH[\s\S]*?target\.detach_mount\(\)\?;[\s\S]*?return Ok\(0\)[\s\S]*?target\.unmount\(\)\?[\s\S]*?Ok\(0\)
