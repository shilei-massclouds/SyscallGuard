applies_to_syscalls:
- ioctl
- getdents64
- getcwd
path: os/StarryOS/kernel/src/syscall/fs/ctl.rs
patterns:
- label: ioctl reads user integer pointer
  regex: pub fn sys_ioctl[\s\S]*?\.vm_read\(\)\?
- label: getdents64 writes user buffer
  regex: pub fn sys_getdents64[\s\S]*?vm_write_slice\(buf,\s*&buffer\.buf\)\?
- label: getcwd writes user buffer
  regex: pub fn sys_getcwd[\s\S]*?vm_write_slice\(buf,\s*cwd\)\?
