schema_name: review-record
version: 1
description: batches/<id>/reviews/*-signoff.yaml 的结构说明。
required_fields:
  - batch_id
  - step_id
  - artifact
  - status
  - reviewer
  - reviewed_at_utc
  - decision_summary
  - required_changes
  - follow_up
status_values:
  - pending_human_review
  - confirmed
  - changes_requested
  - not_applicable
