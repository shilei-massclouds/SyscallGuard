schema_name: step-status
version: 1
description: 嵌入步骤报告或抽取为 YAML 的步骤状态结构。
required_fields:
  - batch_id
  - step_id
  - status
  - inputs
  - outputs
  - review
status_values:
  - draft
  - ready_for_review
  - accepted
  - blocked
fields:
  inputs: 步骤使用的路径或外部引用。
  outputs: 步骤产出的路径。
  review: review sign-off 文件路径。
  blockers: 缺失输入、未解决 gap 或审核修改项。
