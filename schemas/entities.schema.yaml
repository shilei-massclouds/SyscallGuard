schema_name: syscallguard-shared-entities
version: 8
entities:
  syscall_index:
    kind: syscallguard_syscall_index
    storage: library/syscalls.yaml
    required: [syscalls]
    rule_reference_required: [rule_id, path]
    notes: Each rule reference is preceded by the exact Chinese summary comment from its rule file.
  ingest_report:
    kind: syscallguard_ingest_report
    storage: runs/spec-*/report.md trailing YAML metadata
    required: [report_id, generated_at_utc, source, count, pending_count, selected_syscalls, syscalls]
    optional: [requested_syscalls]
    syscall_result_values: [formed_rules, no_rules]
    rule_version_required: [id, generated_at_utc, content_hash]
  rule:
    kind: syscallguard_rule
    required: [rule_id, category, semantics, semantic_hash, generated_at_utc, sources]
    notes: sources do not participate in semantic_hash or downstream invalidation.
  mapping_report:
    kind: syscallguard_mapping_report
    storage: runs/mapping-*/report.md trailing YAML metadata
    required: [report_id, status, generated_at_utc, rule_index_hash, target, counts, execution_scope, rule_syscalls, rules, entity_versions, remaining]
    rule_status_values: [covered, needs_review, unsupported, pending]
    notes: target.branch records the user-created dedicated Starry branch; rules contains the complete current rule library; execution_scope contains only this report's executable outputs.
  static_check_index:
    kind: syscallguard_starry_static_check_index
    storage: targets/starry/static-checks.yaml
    required: [syscalls]
    row_required: [check_id, path, rule_refs]
  static_check:
    kind: syscallguard_starry_static_check
    storage: targets/starry/static-checks/*.yaml
    required: [check_id, rule_refs, path, patterns, target_dependencies, target_content_fingerprint, generated_at_utc, upstream_dependencies]
  dynamic_test_index:
    kind: syscallguard_starry_dynamic_test_index
    storage: targets/starry/dynamic-tests.yaml
    required: [syscalls]
    row_required: [test_id, path, rule_refs]
  dynamic_test:
    kind: syscallguard_starry_dynamic_test
    storage: targets/starry/dynamic-tests/*.yaml
    required: [test_id, rule_refs, test_source, build, command, target_dependencies, target_content_fingerprint, generated_at_utc, upstream_dependencies]
    optional_assets: targets/starry/dynamic-tests/assets/**
    result_values: [pass, fail, skipped, not_run]
  finding:
    kind: syscallguard_starry_finding
    required: [finding_id, syscall, rule_id, target_snapshot_hash, status, resolution, occurrences, generated_at_utc, upstream_dependencies]
    status_values: [confirmed]
    resolution_values: [open, fixed, superseded, no_longer_reproduces]
    optional: [superseded_by, fix_ref, fixed_by_run]
  fix:
    kind: syscallguard_starry_fix
    required: [fix_id, finding_refs, patch, starry_branch, regression, status, generated_at_utc, upstream_dependencies]
    optional: [source_check_report_ids]
dependency_version:
  required: [id, generated_at_utc, content_hash]
  validation: Compare generated_at_utc first, then content_hash; reject either mismatch as stale.
git_commit_ids:
  persistence: forbidden
  replacement: Stable entity IDs plus semantic/content hashes and target content fingerprints.
