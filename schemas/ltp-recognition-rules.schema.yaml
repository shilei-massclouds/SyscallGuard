schema_name: syscallguard-ltp-recognition-rules
version: 1
required: [adapter, recognizers, array_expansion, struct_evidence, document_context, expected_normalization, preconditions, rule_template]
adapter: ltp
recognizer_required: [id, enabled, kind, names, expected]
recognizer_kinds: [tst_exp, property, old_test, safe_helper]
notes:
  - Recognizer IDs are stable and unique.
  - C call parsing, parenthesis matching, and struct-array parsing remain adapter code.
  - Every changeable recognition or normalization decision belongs in this file.
  - Evidence classes are authoritative, context, and unresolved; context never blocks publication.
  - Modern LTP document blocks provide context and conflict diagnostics but never form rules.
