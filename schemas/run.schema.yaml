schema_name: syscallguard-run
version: 3
required:
  - schema_version
  - kind
  - run_id
  - stage
  - status
  - created_at_utc
  - completed_at_utc
  - invocation
  - entities
  - entity_hashes
  - outputs
  - counts
  - blockers
  - error
stage_values: [mapping, check, fix]
status_values: [running, completed, completed_with_blockers, failed, superseded]
upstream_stage:
  mapping: ingest_report
  check: mapping
  fix: check
optional:
  from_report_id: Required for mapping runs.
  from_run_id: Required for check and fix runs.
  rule_syscalls: Rule-to-syscall ownership copied from the ingest report.
  entity_versions: Version snapshots keyed by entity type and ID.
  result_version: Version of a check result entity.
  patch_version: Version of a generated implementation patch.
