schema_name: syscallguard-run
version: 7
required:
  - schema_version
  - kind
  - run_id
  - stage
  - status
  - created_at_utc
  - completed_at_utc
  - invocation
  - entities
  - entity_hashes
  - outputs
  - counts
  - blockers
  - error
stage_values: [fix]
status_values: [running, completed, completed_with_blockers, failed, superseded]
upstream_stage:
  fix: check_reports
optional:
  source_check_report_ids: Required for new fix runs and identifies every evidence-bearing check report.
  from_run_id: Historical compatibility field identifying one parent check report.
  entity_versions: Version snapshots keyed by entity type and ID.
  patch_version: Version of a generated implementation patch.
