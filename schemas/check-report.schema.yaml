schema_name: syscallguard-check-report
version: 1
kind: syscallguard_check_report
storage: runs/check-*/report.md
status_values: [completed, completed_with_blockers]
required:
  - schema_version
  - kind
  - report_id
  - status
  - generated_at_utc
  - content_hash
  - mapping_report_id
  - mapping_report_version
  - target
  - input_hash
  - entity_versions
  - execution_scope
  - rule_syscalls
  - static
  - dynamic
  - counts
  - blockers
  - finding_ids
  - finding_versions
result_values:
  static: [pass, fail, error]
  dynamic: [pass, fail, skipped, not_run]
optional:
  reused_from: Prior check report whose unchanged results were reused.
  diagnostic_directory: Retained temporary directory for blockers.
  base_execution_scope: Scope supplied by the mapping report.
  revalidation_scope: Additional entities used to revalidate older-snapshot findings.
  effective_execution_scope: Actual merged execution scope.
  new_finding_ids: Open current-snapshot findings first created by this report.
  carried_finding_ids: Open current-snapshot findings retained without conclusive execution.
  revalidated_finding_ids: Older or current findings conclusively transitioned by this report.
  needs_revalidation_finding_ids: Open findings that could not be conclusively revalidated.
