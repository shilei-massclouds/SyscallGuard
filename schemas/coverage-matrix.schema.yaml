schema_name: coverage-matrix
version: 1
description: batches/<id>/outputs/coverage-matrix.yaml 的结构说明。
required_top_level_keys:
  - batch_id
  - generated_at_utc
  - coverage
coverage_item_required_fields:
  - behavior_id
  - title
  - source_refs
  - checkability
  - starry_evidence
  - validation
  - triage
  - review_status
checkability_values:
  - static
  - partial_static
  - dynamic
  - unsupported
  - needs_review
triage_values:
  - covered
  - covered_pending_human_review
  - gap
  - risk
  - unsupported
  - needs_review
