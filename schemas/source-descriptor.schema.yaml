schema_name: syscallguard-source-descriptor
version: 3
required: [source_id, adapter, location, revision]
adapter_values: [ltp]
optional:
  default_count: Positive integer or all. Used only when the command omits both count and syscalls.
notes:
  - Source aliases and default_source live in sources/index.yaml.
  - LTP syscall candidates are always sorted by normalized syscall name.
  - Recognition behavior lives only in sources/adapters/ltp/recognition-rules.yaml.
